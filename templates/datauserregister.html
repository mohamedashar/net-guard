<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NETGUARD – Student Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css?family=Poppins:300,400,600,700" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    background:linear-gradient(135deg,#f8fafc,#e3f2fd);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    background:#fff;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.logo{
    font-size:24px;
    font-weight:700;
    color:#0b3d91;
}
.logo span{color:#d32f2f;}

.menu{display:flex;gap:22px;}
.menu a{text-decoration:none;color:#222;font-weight:600;transition:.3s;}
.menu a:hover{color:#0b3d91;}

/* CENTER */
.center{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

/* CARD */
.card{
    width:480px;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 25px 60px rgba(0,0,0,0.08);
    border:1px solid #eee;
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 35px 70px rgba(0,0,0,0.12);
}

.card h2{
    text-align:center;
    margin-bottom:25px;
    color:#0b3d91;
}

/* INPUT */
.input-group{margin-bottom:18px;}
.input-group label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
    font-weight:600;
}

.input-wrap{position:relative;}
.input-wrap i{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:#0b3d91;
}

.input-group input,
.input-group select{
    width:100%;
    padding:12px 12px 12px 40px;
    border-radius:12px;
    border:1px solid #d1d5db;
    outline:none;
    transition:.3s;
}

.input-group input:focus,
.input-group select:focus{
    border-color:#0b3d91;
    box-shadow:0 0 0 3px rgba(11,61,145,0.15);
}

/* RADIO */
.radio-group{display:flex;gap:18px;font-size:14px;}

/* OTP */
.otp-row{display:flex;gap:10px;}
.otp-btn{
    background:linear-gradient(90deg,#0b3d91,#1e88e5);
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}
.otp-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.success{color:green;font-size:13px;margin-top:6px;}
.error{color:red;font-size:13px;margin-top:6px;}

/* SUBMIT */
.submit-btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:#94a3b8;
    color:white;
    font-weight:700;
    margin-top:10px;
    cursor:not-allowed;
    transition:.3s;
}

.submit-btn.enabled{
    background:linear-gradient(90deg,#0b3d91,#1e88e5);
    cursor:pointer;
}
.submit-btn.enabled:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

/* FOOTER */
.footer{
    background:#0f172a;
    color:#cbd5e1;
    text-align:center;
    padding:18px;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">NET<span>GUARD</span></div>
    <div class="menu">
        <a href="/">Home</a>
        <a href="/adminlogin">ADMIN</a>
        <a href="/UserLogin">STAFF LOGIN</a>
        <a href="/Datauser">STUDENT LOGIN</a>
    </div>
</div>

<div class="center">
<form class="card" method="post" action="/rNewDataUser">

<h2><i class="fas fa-user-graduate"></i> Student Registration</h2>

<div class="input-group">
<label>Name</label>
<div class="input-wrap">
<i class="fas fa-user"></i>
<input type="text" name="name" required>
</div>
</div>

<div class="input-group">
<label>Gender</label>
<div class="radio-group">
<label><input type="radio" name="gender" value="male"> Male</label>
<label><input type="radio" name="gender" value="female"> Female</label>
</div>
</div>

<div class="input-group">
<label>Register Number</label>
<div class="input-wrap">
<i class="fas fa-id-card"></i>
<input type="text" name="register_number" required>
</div>
</div>

<div class="input-group">
<label>Year of Study</label>
<div class="input-wrap">
<i class="fas fa-calendar"></i>
<select name="year" required>
<option value="">Select Year</option>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>
</div>
</div>

<div class="input-group">
<label>Department</label>
<div class="input-wrap">
<i class="fas fa-building"></i>
<select name="department" required>
<option value="">Select Department</option>
<option>CSE</option>
<option>IT</option>
<option>ECE</option>
<option>EEE</option>
<option>MECH</option>
<option>CIVIL</option>
</select>
</div>
</div>

<!-- EMAIL OTP -->
<div class="input-group">
<label>Email</label>
<div class="otp-row">
<div class="input-wrap" style="flex:1">
<i class="fas fa-envelope"></i>
<input type="email" id="email" name="email" required>
</div>
<button type="button" class="otp-btn" onclick="sendOTP()">Send OTP</button>
</div>
</div>

<div class="input-group">
<label>Enter OTP</label>
<div class="otp-row">
<div class="input-wrap" style="flex:1">
<i class="fas fa-shield-halved"></i>
<input type="text" id="otp">
</div>
<button type="button" class="otp-btn" onclick="verifyOTP()">Verify</button>
</div>
<div id="msg"></div>
</div>

<div class="input-group">
<label>Username</label>
<div class="input-wrap">
<i class="fas fa-id-badge"></i>
<input type="text" name="uname" required>
</div>
</div>

<div class="input-group">
<label>Password</label>
<div class="input-wrap">
<i class="fas fa-lock"></i>
<input type="password" name="password" required>
</div>
</div>

<button class="submit-btn" id="registerBtn" disabled>
<i class="fas fa-user-check"></i> Register
</button>

</form>
</div>

<div class="footer">
© 2026 NETGUARD – College Academic Security Portal
</div>

<script>
function sendOTP(){
let email=document.getElementById("email").value;
fetch("/send_otp",{method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"email="+email})
.then(res=>res.text())
.then(()=>{document.getElementById("msg").innerHTML="<div class='success'>OTP Sent ✔</div>";});
}

function verifyOTP(){
let otp=document.getElementById("otp").value;
fetch("/verify_otp",{method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"otp="+otp})
.then(res=>res.text())
.then(data=>{
if(data==="success"){
document.getElementById("msg").innerHTML="<div class='success'>Verified ✔</div>";
let btn=document.getElementById("registerBtn");
btn.disabled=false;
btn.classList.add("enabled");
}else{
document.getElementById("msg").innerHTML="<div class='error'>Wrong OTP ✖</div>";
}
});
}
</script>

</body>
</html>
