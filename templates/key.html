<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NETGUARD</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css?family=Poppins:300,400,600,700" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#ffffff;
    color:#111;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* ================= HEADER ================= */
.header{
    background:#fff;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 4px 20px rgba(0,0,0,0.06);
    position:sticky;
    top:0;
}

.logo{
    font-size:24px;
    font-weight:800;
    color:#0b3d91;
}

.logo span{
    color:#d32f2f;
}

/* ================= MENU ================= */
.menu{
    display:flex;
    gap:22px;
}

.menu a{
    position:relative;
    text-decoration:none;
    color:#222;
    font-weight:600;
    padding:6px 2px;
    transition:.3s;
}

.menu a::after{
    content:"";
    position:absolute;
    width:0;
    height:3px;
    left:0;
    bottom:-6px;
    background:linear-gradient(90deg,#0b3d91,#ffd60a);
    transition:.3s;
}

.menu a:hover{
    color:#0b3d91;
}

.menu a:hover::after{
    width:100%;
}

/* ================= SPLASH ================= */
.splash{
    width:92%;
    max-width:1000px;
    margin:30px auto;
}

.splash img{
    width:100%;
    border-radius:14px;
    box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

/* ================= CONTAINER ================= */
.container{
    width:95%;
    max-width:520px;
    margin:0 auto 60px auto;
    background:white;
    padding:30px;
    border-radius:16px;
    box-shadow:0 20px 45px rgba(0,0,0,0.08);
    border:1px solid #eee;
    transition:.3s;
}

.container:hover{
    transform:translateY(-5px);
    box-shadow:0 25px 55px rgba(0,0,0,0.12);
}

/* ================= TITLE ================= */
.title{
    text-align:center;
    font-size:22px;
    font-weight:700;
    margin-bottom:25px;
    color:#0b3d91;
}

/* ================= INPUT ================= */
.input-group{
    margin-bottom:18px;
}

.input-group label{
    font-weight:600;
    margin-bottom:6px;
    display:block;
}

.input-wrap{
    position:relative;
}

.input-wrap i{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:#0b3d91;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:11px 12px 11px 38px;
    border-radius:8px;
    border:1px solid #d1d5db;
    outline:none;
    transition:.3s;
}

.input-group input:focus{
    border-color:#0b3d91;
    box-shadow:0 0 0 3px rgba(11,61,145,0.15);
}

/* ================= BUTTONS ================= */
.btn-group{
    display:flex;
    gap:12px;
    justify-content:flex-end;
    margin-top:10px;
}

.reset-btn{
    background:#94a3b8;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

.reset-btn:hover{
    transform:translateY(-2px);
}

.submit-btn{
    background:linear-gradient(90deg,#0b3d91,#1e88e5);
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
    transition:.3s;
}

.submit-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

/* ================= FOOTER ================= */
.footer{
    margin-top:auto;
    background:#0f172a;
    color:#cbd5e1;
    text-align:center;
    padding:18px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">NET<span>GUARD</span></div>

    <div class="menu">
        <a href="/userhome">Homepage</a>
        <a href="/fileupload">File Upload</a>
        <a href="/viewfile">View File</a>
        <a href="/userrequest">User Request</a>
        <a href="/">Logout</a>
    </div>
</div>

<!-- SPLASH -->
<div class="splash">
    <img src="static/images/1.jpg" alt="">
</div>

<!-- CONTENT -->
<div class="container">
    <div class="title">
        <i class="fas fa-key"></i> File Decryption
    </div>

    <form method="post" action="/fkey">

        <div class="input-group">
            <label>Enter File Key</label>
            <div class="input-wrap">
                <i class="fas fa-shield-halved"></i>
                <input name="filekey" type="text" id="filekey" required>
            </div>
        </div>

        <div class="btn-group">
            <input type="reset" value="Reset" class="reset-btn">
            <input type="submit" value="Submit" class="submit-btn">
        </div>

    </form>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 NETGUARD – Security Operations
</div>

</body>
</html>
